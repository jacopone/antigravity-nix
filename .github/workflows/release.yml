name: Create Release

on:
  # Trigger when Update workflow completes (bypasses GITHUB_TOKEN limitation)
  workflow_run:
    workflows: ["Update Google Antigravity"]
    types:
      - completed
  # Keep push trigger for manual merges by humans
  push:
    branches:
      - master
    paths:
      - "package.nix"
      - "cli.nix"
      - "flake.nix"
      - "google-antigravity2.nix"
      - "google-antigravity-ide.nix"
      - "artifacts/antigravity-2-and-ide--1--scraped-links.json"
      - "artifacts/antigravity-2-and-ide--2--prefetched-sha256.json"
      - "artifacts/antigravity-cli--manifests/*.json"
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    # Only run if: workflow_dispatch, push event, OR workflow_run that succeeded
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if release needed
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get current versions
          CURRENT_APP=$(jq -r '."Antigravity 2.0".linux.x64 | match("([0-9]+\\.[0-9]+\\.[0-9]+-[0-9]+)") | .captures[0].string' artifacts/antigravity-2-and-ide--1--scraped-links.json)
          CURRENT_CLI=$(jq -r '.version' artifacts/antigravity-cli--manifests/linux_amd64.json)
          TAG_NAME="v$CURRENT_APP-$CURRENT_CLI"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "app_version=$CURRENT_APP" >> $GITHUB_OUTPUT
          echo "cli_version=$CURRENT_CLI" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG_NAME"

          # Check if release already exists for this tag
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Release $TAG_NAME already exists, skipping"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Release $TAG_NAME does not exist, will create"
          fi

      - name: Create release
        if: steps.release_check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release_check.outputs.tag_name }}
          APP_VERSION: ${{ steps.release_check.outputs.app_version }}
          CLI_VERSION: ${{ steps.release_check.outputs.cli_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Google Antigravity App $APP_VERSION / CLI $CLI_VERSION"
          git push origin "$TAG_NAME"

          gh release create "$TAG_NAME" \
            --title "Google Antigravity App $APP_VERSION / CLI $CLI_VERSION" \
            --notes "Auto-updated Google Antigravity to App $APP_VERSION and CLI $CLI_VERSION.

          ## Installation

          \`\`\`nix
          inputs.antigravity-nix.url = \"github:srghma/antigravity-nix/$TAG_NAME\";
          \`\`\`

          ## Included Packages

          - **Google Antigravity (App)**: \`$APP_VERSION\` (Agent Manager Desktop)
          - **Google Antigravity CLI (agy)**: \`$CLI_VERSION\`

          ## What's New

          See: [Releases page](https://antigravity.google/releases)

          ## Features

          - 🤖 Agentic IDE & Agent Manager
          - 🚀 Auto-updating daily at 07:00 UTC
          - 📦 Multi-platform support: Linux & macOS (x86_64, aarch64)
          - 🔧 FHS Environment: Maximum Linux compatibility"

          echo "✓ Created release $TAG_NAME"
